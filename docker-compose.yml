# ═══════════════════════════════════════════════════════════════
# Slingshot Trading Engine v4.3.5 Titanium — Docker Compose
# Despliegue para VPS (Londres/Hetzner/DigitalOcean)
# ═══════════════════════════════════════════════════════════════

services:
  # ── Backend (FastAPI + Motor SMC + WebSocket) ────────────────
  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: slingshot-engine
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - OLLAMA_HOST=http://ollama:11434
    env_file:
      - .env
    mem_limit: 2g
    mem_reservation: 512m
    cpus: 1.5
    networks:
      - slingshot-net
    depends_on:
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ── Frontend (Next.js) ───────────────────────────────────────
  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: slingshot-ui
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_API_WS_URL=ws://backend:8000
    mem_limit: 1g
    mem_reservation: 256m
    cpus: 0.5
    networks:
      - slingshot-net
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "2"

  # ── Ollama (Motor LLM Local) ─────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: slingshot-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    mem_limit: 4g
    mem_reservation: 2g
    cpus: 2.0
    networks:
      - slingshot-net
    # Pre-pull del modelo al iniciar (fire-and-forget)
    entrypoint: >
      sh -c "ollama serve &
             sleep 5 &&
             ollama pull gemma3:4b &&
             wait"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "2"

  # ── Nginx Reverse Proxy (Opcional: HTTPS + Rate Limiting) ────
  # Descomenta si necesitas SSL/TLS en producción
  # nginx:
  #   image: nginx:alpine
  #   container_name: slingshot-proxy
  #   restart: always
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf
  #     - ./deploy/certs:/etc/nginx/certs
  #   networks:
  #     - slingshot-net
  #   depends_on:
  #     - frontend
  #     - backend

networks:
  slingshot-net:
    driver: bridge

volumes:
  ollama-models:
    driver: local
